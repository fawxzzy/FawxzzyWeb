name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      EVIDENCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EVIDENCE_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ env.EVIDENCE_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Verify
        run: npm run verify

      - name: Capture portable visual evidence
        run: npm run evidence:visual

      - name: Upload exact-head visual evidence
        uses: actions/upload-artifact@v7
        with:
          name: fawxzzyweb-visual-${{ env.EVIDENCE_SHA }}
          path: visual-evidence/${{ env.EVIDENCE_SHA }}
          if-no-files-found: error
          retention-days: 30

      - name: Build Lifeline container
        run: docker build --tag fawxzzyweb-ci:${{ env.EVIDENCE_SHA }} .
